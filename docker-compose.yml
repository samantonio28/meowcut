services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meowcut
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    networks:
      - meowcut-network

  meowcut:
    build: .
    ports:
      - "8080:8080"
    environment:
      STORAGE_TYPE: pg
      CONFIG_PATH: /root/configs/server.yaml
    depends_on:
      - postgres
    volumes:
      - ./logs:/root/logs
    networks:
      - meowcut-network

volumes:
  postgres_data:

networks:
  meowcut-network:
