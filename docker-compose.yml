services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meowcut
    ports:
      - "5455:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    networks:
      - meowcut-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  meowcut:
    build: .
    ports:
      - "8080:8080"
    environment:
      STORAGE_TYPE: pg
      CONFIG_PATH: /root/configs/server.yaml
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./logs:/root/logs
    networks:
      - meowcut-network

volumes:
  postgres_data:

networks:
  meowcut-network:
